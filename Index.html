<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laporan OOP Dart - Interaktif</title>

<style>
body{
  font-family: Arial, sans-serif;
  margin:40px;
  background:#f4f6f9;
}

h1,h2{
  color:#2c3e50;
}

.section{
  margin-bottom:40px;
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

button{
  padding:8px 15px;
  background:#0066ff;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin-top:10px;
}

button:hover{
  background:#0044cc;
}

/* ===== MODAL ===== */
.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  z-index:9999;
}

.modal-content{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:90%;
  max-width:1000px;
  height:80%;
  background:white;
  border-radius:10px;
  overflow:hidden;
}

.modal iframe{
  width:100%;
  height:100%;
  border:none;
}
</style>
</head>

<body>

<h1>LAPORAN OOP DART (INTERAKTIF)</h1>
<p><b>Nama:</b> Azriel Miracle Yuandre <br>
<b>NIM:</b> 251410024</p>

<div class="section">
<h2>Contoh 1: Class Car</h2>
<p>Klik tombol untuk melihat dan menjalankan kode di DartPad.</p>
<button onclick="openModal('https://dartpad.dev/embed-dart.html?id=bd3af42ea20c8e23cc0e63354048a81c')">
Lihat & Jalankan Code
</button>
</div>

<div class="section">
<h2>Contoh 2: Class Mahasiswa (Validasi Constructor)</h2>
<button onclick="openModal('https://dartpad.dev/embed-dart.html?id=bd3af42ea20c8e23cc0e63354048a81c')">
Lihat & Jalankan Code
</button>
</div>

<div class="section">
<h2>Contoh 3: Encapsulation (Getter & Setter)</h2>
<button onclick="openModal('https://dartpad.dev/embed-dart.html?id=bd3af42ea20c8e23cc0e63354048a81c')">
Lihat & Jalankan Code
</button>
</div>


<div class="modal" id="modal" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <iframe id="dartFrame"></iframe>
  </div>
</div>

<script>
function openModal(link){
  document.getElementById("modal").style.display="block";
  document.getElementById("dartFrame").src=link;
}

function closeModal(){
  document.getElementById("modal").style.display="none";
  document.getElementById("dartFrame").src="";
}
</script>

</body>
